<header>
    <a routerLink="/welcomePage">Logito</a>
    <nav>
        <ng-container *ngIf="usuario; else noLogueado">
            <span> Hola, {{usuario.nombre}}</span>
            <a [routerLink]="['/usuario', usuario.id_usuario]">Mi Perfil</a>
            <button (click)="cerrarSesion()">Cerrar Sesión</button>
        </ng-container>

        <ng-template #noLogueado>
            <a routerLink="/login">Iniciar sesión</a>
            <a routerLink="/register">Registrarse</a>
        </ng-template>
            
    </nav>
</header>
