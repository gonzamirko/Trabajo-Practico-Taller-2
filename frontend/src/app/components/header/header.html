<header>
    <a [routerLink]="user ? '/home' : '/welcomePage'"><img src="assets/img/loguito.png" alt="Perfil" alt="Logo" style="height:60px; margin: 0px; " />
</a>
    <nav>
        <ng-container *ngIf="user; else noLogueado">
            <span> Hola, {{user.nombre}}</span>
            <a [routerLink]="['/usuario', user.id_usuario]">Mi Perfil</a>
            <a routerLink="/carrito">      <i class="fa-solid fa-cart-shopping"></i>
</a>
             <button (click)="cerrarSesion()">Cerrar Sesión</button> 
        </ng-container>

        <ng-template #noLogueado>
            <a routerLink="/login">Iniciar sesión</a>
            <a routerLink="/register">Registrarse</a>
        </ng-template>

    </nav>
</header>
