<header>
    <a routerLink="/welcomePage">Logito</a>
    <nav>
        <ng-container *ngIf="usuario; else noLogueado">
            <span> Hola, {{usuario}}</span>
            <a routerLink="/carrito">Carrito</a>
            <a (click)="cerrarSesion()">Cerrar Sesión</a>
        </ng-container>

        <ng-template #noLogueado>
            <a routerLink="/login">Iniciar sesión</a>
            <a routerLink="/register">Registrarse</a>
        </ng-template>
            
    </nav>
</header>
